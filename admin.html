<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-4">

<h2>Admin Dashboard</h2>

<h4>Add Event</h4>

<input id="title" class="form-control mb-2" placeholder="Event Title">

<input id="description" class="form-control mb-2" placeholder="Description">

<input id="date" type="date" class="form-control mb-2">

<button onclick="addEvent()" class="btn btn-success">Add Event</button>

<hr>

<h3>Registrations</h3>

<div id="list"></div>

</div>

<script>

function addEvent(){

const title=document.getElementById("title").value
const description=document.getElementById("description").value
const date=document.getElementById("date").value

fetch("/add-event",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title,description,date})

})

.then(res=>res.text())
.then(data=>{
alert(data)
})

}

fetch("/registrations")

.then(res=>res.json())

.then(data=>{

let output=""

data.forEach(r=>{

output+=`
<div class="card p-2 mb-2">
Student: ${r.student_email} <br>
Event: ${r.event_title}
</div>
`

})

document.getElementById("list").innerHTML=output

})

</script>

</body>
</html>
